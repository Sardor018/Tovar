<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzum Business Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-center mb-6 space-x-2">
            <button onclick="switchTab('analyzer')" id="tab-btn-analyzer" class="px-6 py-2 rounded-full font-bold shadow-md bg-purple-600 text-white transition">Анализатор</button>
            <button onclick="switchTab('generator')" id="tab-btn-generator" class="px-6 py-2 rounded-full font-bold shadow-md bg-white text-gray-700 transition">Генератор карт</button>
        </div>

        <div id="section-analyzer" class="tab-content">
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
                <h2 class="text-2xl font-bold text-center text-purple-700 mb-4">Uzum Анализатор</h2>
                <div id="serverStatus" class="text-center mb-4 text-sm font-bold text-orange-500">🟡 Подключение к серверu...</div>
                
                <div class="space-y-4 mb-6">
                    <input type="text" id="uzumUrl" placeholder="https://uzum.uz/..." class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-purple-400">
                    <button onclick="analyzeProduct()" id="analyzeBtn" class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold transition">Получить данные</button>
                </div>

                <div id="infoBox" class="hidden p-4 bg-purple-50 rounded-xl border-l-4 border-purple-600 mb-6">
                    <p><strong>Категория:</strong> <span id="resCategory">-</span></p>
                    <p><strong>Цена конкурента:</strong> <span id="resCompetitorPrice">-</span> сум</p>
                    <p><strong>Комиссия FBO:</strong> <span id="resFbo">-</span></p>
                </div>

                <hr class="my-6">
                <h3 class="text-xl font-bold text-center mb-4">Калькулятор прибыли</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div><label class="text-xs font-bold text-gray-500 uppercase">Прибыль %</label><input type="number" id="valA" value="20" class="w-full p-2 border rounded-lg"></div>
                    <div><label class="text-xs font-bold text-gray-500 uppercase">Себестоимость</label><input type="number" id="valB" placeholder="15000" class="w-full p-2 border rounded-lg"></div>
                    <div><label class="text-xs font-bold text-gray-500 uppercase">Комиссия Uzum %</label><input type="number" id="valC" value="15" class="w-full p-2 border rounded-lg"></div>
                </div>

                <div class="bg-gray-50 p-6 rounded-2xl text-center border border-gray-100">
                    <p id="output" class="text-3xl font-black text-blue-600">0 сум</p>
                    <p id="foyda" class="text-2xl font-bold text-green-600 mt-2">0 сум</p>
                </div>
            </div>
        </div>

        <div id="section-generator" class="tab-content hidden">
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
                <h2 class="text-2xl font-bold text-center text-pink-600 mb-6">Uzum Cashback Generator</h2>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="number" id="input-count" value="10" class="p-3 border rounded-xl" placeholder="Soni">
                    <input type="text" id="input-prefix" value="NT" class="p-3 border rounded-xl uppercase" placeholder="Prefix">
                </div>
                <input type="text" id="input-sum" value="20 000 SO'M" class="w-full p-3 border rounded-xl mb-4 font-bold text-pink-600 text-center">
                <input type="text" id="input-bot" value="@NeuroTechUzBot" class="w-full p-3 border rounded-xl mb-6 text-center">
                
                <button onclick="startBulkGeneration()" id="btn-generate" class="w-full bg-pink-500 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-pink-600 transition">🚀 Создать карточки (ZIP)</button>

                <div id="status-container" class="hidden mt-6 bg-pink-50 p-4 rounded-xl text-center">
                    <p id="status-text" class="text-pink-700 font-semibold text-sm">Генерация начата...</p>
                    <div class="w-full bg-pink-100 h-2 rounded-full mt-2">
                        <div id="progress-bar" class="bg-pink-500 h-2 rounded-full transition-all w-0"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div style="position: absolute; left: -9999px; top: 0;">
        <div id="export-template-uz" class="export-template" style="width: 1080px; height: 1440px; background: #fff; padding: 50px; position: relative; font-family: 'Montserrat';">
            <div class="text-center">
                <h1 style="font-size: 80px; font-weight: 900; color: #1f2937;">TABRIKLAYMIZ!<br>SIZ</h1>
                <div style="background: #ec4899; color: white; padding: 30px; border-radius: 50px; font-size: 90px; font-weight: 900; margin: 40px auto; display: inline-block;" id="render-sum-uz">20 000 SO'M</div>
                <h1 style="font-size: 80px; font-weight: 900; color: #1f2937;">YUTDINGIZ! 🎉</h1>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
